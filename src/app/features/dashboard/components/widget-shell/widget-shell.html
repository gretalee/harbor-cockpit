<div class="relative rounded-lg border border-gray-200 bg-green-200 p-2 shadow-sm">
  <button
    type="button"
    class="absolute right-2 top-2 text-gray-400 hover:text-gray-600"
    (click)="remove.emit()"
  >
    &times;
  </button>

  <div class="mb-2 flex items-center gap-2 pr-6">
    <svg
      cdkDragHandle
      class="h-5 w-5 shrink-0 cursor-grab text-gray-400 hover:text-gray-600 active:cursor-grabbing"
      viewBox="0 0 24 24"
      fill="currentColor"
      aria-hidden="true"
    >
      <circle cx="9" cy="6" r="1.5" />
      <circle cx="15" cy="6" r="1.5" />
      <circle cx="9" cy="12" r="1.5" />
      <circle cx="15" cy="12" r="1.5" />
      <circle cx="9" cy="18" r="1.5" />
      <circle cx="15" cy="18" r="1.5" />
    </svg>
    <img [src]="icon()" alt="" class="h-5 w-5" />
    <h3 class="text-xl font-semibold text-gray-900">{{ title() }}</h3>
  </div>
  <ng-content></ng-content>
</div>
