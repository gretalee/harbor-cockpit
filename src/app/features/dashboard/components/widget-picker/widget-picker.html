<div class="flex flex-wrap gap-2">
  @for (item of items(); track item.id) {
    <button
      type="button"
      class="flex items-center gap-1.5 rounded-md border border-gray-300 px-3 py-1.5 text-sm hover:bg-gray-50"
      (click)="pick.emit(item)"
    >
      <img [src]="item.icon" alt="" class="h-4 w-4" />
      <span>{{ item.title }}</span>
    </button>
  }
</div>
