  [attr.height]="size()"

  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
>

    @case ('clear-day') {
      <circle cx="12" cy="12" r="4" />
      <line x1="12" y1="2" x2="12" y2="4" />
      <line x1="12" y1="20" x2="12" y2="22" />

      <path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z" />

      <path d="M6.5 18h10a3.5 3.5 0 0 0 .4-6.98A5 5 0 0 0 7 11.5 3.5 3.5 0 0 0 6.5 18Z" />
    }
    @case ('cloudy') {
      <path d="M6.5 17h11a4 4 0 0 0 .5-7.97A6 6 0 0 0 6.7 11.06 4 4 0 0 0 6.5 17Z" />
    }
    @case ('fog') {
      <path d="M6.5 12h11a3.5 3.5 0 0 0 .4-6.98A5.5 5.5 0 0 0 7 7.5 3.5 3.5 0 0 0 6.5 12Z" />

      <path d="M3 8h11a2.5 2.5 0 1 0-2.5-2.5" />

      <path d="M3 18h8" />

    @case ('rain') {
      <path d="M6.5 13h11a3.5 3.5 0 0 0 .4-6.98A5.5 5.5 0 0 0 7 8.5 3.5 3.5 0 0 0 6.5 13Z" />

      <line x1="13" y1="16" x2="12" y2="19" />
      <line x1="17" y1="16" x2="16" y2="19" />

    @case ('sleet') {
      <path d="M6.5 13h11a3.5 3.5 0 0 0 .4-6.98A5.5 5.5 0 0 0 7 8.5 3.5 3.5 0 0 0 6.5 13Z" />

      <path d="M13 12.5l-2.5 4.5h3l-2 4.5" />
    }
    @default {
      <circle cx="12" cy="12" r="9" opacity="0.3" />
    }
  }
</svg>
