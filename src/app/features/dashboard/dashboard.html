<div class="relative mx-auto w-full max-w-[1800px] px-4 py-6">
  <div class="mb-6 flex items-center justify-end">
    <div class="relative">
      <button
        type="button"
        aria-label="Widget hinzufügen"
        class="flex h-9 w-9 items-center justify-center rounded-full border border-gray-300 text-xl leading-none text-gray-600 hover:bg-gray-50"
        (click)="$event.stopPropagation(); toggleFlyout()"
      >
        +
      </button>
      <app-flyout [open]="isFlyoutOpen()" (closed)="isFlyoutOpen.set(false)">
        <app-widget-picker [items]="pickerItems()" />
      </app-flyout>
    </div>
  </div>

  <div
    cdkDropList
    cdkDropListOrientation="mixed"
    [id]="dashboardDropListId"
    [cdkDropListConnectedTo]="[widgetPickerDropListId]"
    (cdkDropListDropped)="onWidgetDropped($event)"
    class="grid min-h-52 grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"
  >
    @for (item of dashboardWidgets(); track item.instance.instanceId) {
      <div cdkDrag [cdkDragDisabled]="true">
        <app-widget-shell
          [title]="item.definition?.title ?? ''"
          [icon]="item.definition?.icon ?? ''"
          (remove)="removeWidget(item.instance.instanceId)"
        >
          <app-widget-loader [widgetId]="item.instance.widgetId" [config]="item.instance.config" />
        </app-widget-shell>
      </div>
    }
  </div>
</div>
