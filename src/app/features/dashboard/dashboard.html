<ng-template #headerActionsTpl>
  <app-flyout
    [(open)]="isFlyoutOpen"
    position="bottom-right"
    [offset]="8"
    ariaLabel="Widget hinzufügen"
  >
    <span flyoutTrigger>+</span>
    <app-widget-picker
      [items]="pickerItems()"
      (pick)="onWidgetPicked($event)"
      (droppedWithoutTarget)="onWidgetPicked($event)"
    />
  </app-flyout>
</ng-template>

<div class="mx-auto w-full max-w-[1800px] px-4 py-6">
  <div
    cdkDropList
    cdkDropListOrientation="mixed"
    [id]="dashboardDropListId"
    (cdkDropListDropped)="onWidgetDropped($event)"
    class="grid min-h-52 grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"
  >
    @for (item of dashboardWidgets(); track item.instance.instanceId) {
      <div cdkDrag [class]="item.columnSpanClass">
        <app-widget-shell
          [title]="item.definition?.title ?? ''"
          [icon]="item.definition?.icon ?? ''"
          (remove)="removeWidget(item.instance.instanceId)"
        >
          <app-widget-loader [widgetId]="item.instance.widgetId" [config]="item.instance.config" />
        </app-widget-shell>
      </div>
    }
  </div>

  @if (dashboardWidgets().length === 0) {
    <div
      class="w-125 mx-auto mt-6 rounded-lg border border-dashed border-gray-200 p-6 text-center text-lg text-gray-400"
    >
      Noch keine Widgets ausgewählt. <br />
      Nutze den Plus-Button, um dir die Widgets reinzuziehen, die du brauchst.
    </div>
  }
</div>
