<div class="relative mx-auto w-full max-w-[1800px] px-4 py-6">
  <div class="absolute right-8 top-8 z-10">
    <app-widget-picker [items]="pickerItems()" (pick)="addWidget($event)" />
  </div>

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
    @for (item of dashboardWidgets(); track item.instance.instanceId) {
      <app-widget-shell
        [title]="item.definition?.title ?? ''"
        [icon]="item.definition?.icon ?? ''"
        (remove)="removeWidget(item.instance.instanceId)"
      >
        <app-widget-loader [widgetId]="item.instance.widgetId" [config]="item.instance.config" />
      </app-widget-shell>
    }
  </div>
</div>
