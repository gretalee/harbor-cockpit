<button
  type="button"
  [attr.aria-label]="ariaLabel()"
  [class]="triggerClss()"
  (click)="$event.stopPropagation(); toggle()"
>
  <ng-content select="[flyoutTrigger]"></ng-content>
</button>
@if (open()) {
  <div
    class="absolute z-50 w-80 rounded-lg border border-gray-200 bg-white p-3 shadow-lg {{
      positionClasses[position()]
    }}"
    [style.margin-top.px]="
      position() === 'bottom-left' || position() === 'bottom-right' ? offset() : null
    "
    [style.margin-bottom.px]="
      position() === 'top-left' || position() === 'top-right' ? offset() : null
    "
  >
    <ng-content></ng-content>
  </div>
}
